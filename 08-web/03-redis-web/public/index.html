<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Logs Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Device Logs Viewer</h1>
    </header>

    <div class="layout">
        <!-- Левая панель: Устройства -->
        <aside class="panel devices-panel">
            <div class="panel-header">
                <h2>Devices</h2>
            </div>
            <div class="filters-container" id="platform-filters">
                <!-- Чекбоксы платформ будут добавлены сюда -->
            </div>
            <div class="list-container" id="devices-list">
                <div class="empty-state">Loading devices...</div>
            </div>
        </aside>

        <!-- Средняя панель: Стримы (Логи) -->
        <aside class="panel streams-panel">
            <div class="panel-header">
                <h2>Streams</h2>
                <span id="current-device-label" class="subtitle"></span>
            </div>
            <div class="list-container" id="streams-list">
                <div class="empty-state">Select a device</div>
            </div>
        </aside>

        <!-- Правая панель: Содержимое лога -->
        <main class="panel logs-panel">
            <div class="panel-header">
                <h2>Log Output</h2>
                <span id="current-stream-label" class="subtitle"></span>
                <div style="margin-left: auto; display: flex; gap: 15px; align-items: center;">
                    <label class="filter-label" style="color: #666; margin: 0;">
                        <input type="checkbox" id="autoscroll-cb" checked> Auto-scroll
                    </label>
                    <div style="display: flex; gap: 5px;">
                        <button id="download-logs-btn" class="icon-btn" title="Download Log" style="display: none;">⬇️</button>
                        <button id="clear-logs-btn" class="icon-btn" title="Clear View">🗑</button>
                    </div>
                </div>
            </div>
            <div class="logs-container" id="logs-container">
                <div class="empty-state">Select a stream to view logs</div>
                <!-- Логи будут добавляться сюда как текстовые блоки -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
